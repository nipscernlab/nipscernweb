<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIPSCERN · ATLAS Event</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#05070f;color:#e4e8f2;font-family:system-ui,-apple-system,sans-serif}
#cgv-canvas-wrapper{position:fixed;inset:0;width:100vw;height:100vh}
#cgv-canvas{display:block;width:100%;height:100%}
.cgv-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(5,7,15,0.8);transition:opacity .4s ease;z-index:10}
.cgv-loading.hidden{opacity:0;pointer-events:none}
.cgv-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#5b9cf6;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="cgv-canvas-wrapper" role="img" aria-label="Interactive 3D ATLAS calorimeter event display">
  <canvas id="cgv-canvas" aria-hidden="true"></canvas>
  <div class="cgv-loading" aria-live="polite">
    <div class="cgv-spinner" aria-hidden="true"></div>
    <span>Initialising calorimeter geometry…</span>
  </div>
</div>
<script type="module">
  import { initATLASScene } from '../../../assets/js/cgv-preview.js';
  initATLASScene('cgv-canvas-wrapper');
</script>
</body>
</html>
