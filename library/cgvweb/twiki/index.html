<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CGV Web — ATLAS TWiki</title>
  <link rel="icon" type="image/svg+xml" href="assets/cgvweb_icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="ribbon">
    <div class="brand">
      <img src="assets/cgvweb_icon.svg" alt="CGV Web">
      <div>
        <b>CGV Web</b><br>
        <span>ATLAS Calorimeter Geometry Viewer</span>
      </div>
    </div>
    <nav>
      <a href="https://nipscern.com/projects/cgv" target="_blank" rel="noopener">Docs</a>
      <a href="https://nipscern.com/projects/cgvweb" target="_blank" rel="noopener">Project</a>
      <a href="https://nipscern.com" target="_blank" rel="noopener">Lab</a>
      <a class="gh" href="https://github.com/nipscernlab/cgv-web" target="_blank" rel="noopener" title="Source on GitHub">
        <object type="image/svg+xml" data="assets/github-octocat.svg" width="26" height="26" aria-label="GitHub"></object>
      </a>
    </nav>
  </header>

  <div class="trail" id="trail">
    <a href="#/WebHome">ATLAS</a> &rsaquo; <a href="#/WebHome">CGV Web</a> &rsaquo; <span>Home</span>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <input class="search" id="search" type="search" placeholder="Filter topics…">
      <h3>CGV Web TWiki</h3>
      <ul id="sidebar-nav"></ul>
      <h3>External</h3>
      <ul>
        <li><a href="https://nipscern.com/projects/cgv" target="_blank" rel="noopener">Extended docs</a></li>
        <li><a href="https://nipscern.com/projects/cgvweb" target="_blank" rel="noopener">Project page</a></li>
        <li><a href="https://atlas.cern/" target="_blank" rel="noopener">ATLAS experiment</a></li>
        <li><a href="https://twiki.cern.ch/twiki/bin/view/Atlas/WebHome" target="_blank" rel="noopener">ATLAS TWiki</a></li>
      </ul>
    </aside>

    <main class="content">
      <div id="topic-body">Loading…</div>
    </main>

    <aside class="toc" id="toc-host">
      <!-- TOC is injected by the parser via the %TOC% marker in each topic. -->
    </aside>
  </div>

  <footer class="foot">
    <div class="partners">
      <a class="lab" href="https://nipscern.com" target="_blank" rel="noopener" title="NIPSCERN laboratory">
        <img src="assets/icon_home_nipscern.svg" alt="NIPSCERN">
        <span>NIPSCERN</span>
      </a>
      <a class="lab" href="https://atlas.cern/" target="_blank" rel="noopener" title="ATLAS Experiment">
        <img src="assets/atlas-logo.png" alt="ATLAS">
      </a>
      <a class="lab" href="https://home.cern/" target="_blank" rel="noopener" title="CERN">
        <img src="assets/cern.svg" alt="CERN">
      </a>
    </div>
    <div class="links">
      <a href="https://nipscern.com/projects/cgv" target="_blank" rel="noopener">Extended docs</a>
      <a href="https://nipscern.com/projects/cgvweb" target="_blank" rel="noopener">Project</a>
      <a href="https://twiki.cern.ch/twiki/bin/view/Atlas/" target="_blank" rel="noopener">ATLAS TWiki</a>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
