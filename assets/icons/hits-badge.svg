<svg xmlns="http://www.w3.org/2000/svg" width="96px" height="96px" viewBox="0 0 960 960" color="#FF6D00">
  <defs>
    <linearGradient id="calo" gradientUnits="userSpaceOnUse" x1="587" y1="-274" x2="245" y2="-594">
      <stop offset="0" stop-color="#2160E0"/>
      <stop offset=".5" stop-color="#16B9E8"/>
      <stop offset="1" stop-color="#19E6C6"/>
    </linearGradient>
    <filter id="starGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="13" result="blur"/>
      <feFlood flood-color="#FFD24A" flood-opacity="0.85"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="arcTop" d="M268.5,228 A329,329 0 0 1 691.5,228" fill="none"/>
    <path id="arcBot" d="M74.1,566.3 A415,415 0 0 0 885.9,566.3" fill="none"/>
  </defs>

  <!-- ring -->
  <circle cx="480" cy="480" r="452" fill="none" stroke="currentColor" stroke-width="7" opacity=".55"/>

  <!-- central collision under the Southern Cross -->
  <g transform="translate(480,480) scale(0.70) translate(-522,545)">
    <path d="M587,-274 Q520,-545 245,-594 L222,-466 Q414,-431 461,-243 Z" fill="url(#calo)"/>
    <g stroke="#0b0e14" stroke-opacity=".26" stroke-width="10" stroke-linecap="round">
      <line x1="429.8" y1="-320" x2="542.4" y2="-385"/>
      <line x1="370.7" y1="-392.9" x2="457.7" y2="-489.5"/>
      <line x1="292.1" y1="-444.2" x2="345" y2="-563"/>
    </g>
    <g fill="none" stroke="currentColor" stroke-width="14" stroke-linecap="round" opacity=".3">
      <path d="M170,-170 Q400,-220 760,-300"/><path d="M170,-170 Q300,-280 560,-400"/>
      <path d="M170,-170 Q250,-450 420,-760"/><path d="M170,-170 Q210,-330 250,-560"/>
      <path d="M170,-170 Q420,-300 780,-720"/><path d="M170,-170 Q350,-250 660,-470"/>
    </g>
    <g fill="none" stroke="currentColor" stroke-width="20" stroke-linecap="round">
      <path d="M170,-170 Q330,-210 470,-300"/><path d="M170,-170 Q300,-330 505,-520"/>
      <path d="M170,-170 Q200,-410 330,-600"/><path d="M170,-170 Q320,-560 620,-860"/>
      <path d="M170,-170 Q470,-330 820,-560"/>
    </g>
    <g fill="#FFD24A" filter="url(#starGlow)">
      <path d="M470,-372 L492,-322 L542,-300 L492,-278 L470,-228 L448,-278 L398,-300 L448,-322 Z"/>
      <path d="M620,-920 L638,-878 L680,-860 L638,-842 L620,-800 L602,-842 L560,-860 L602,-878 Z"/>
      <path d="M330,-658 L347,-617 L388,-600 L347,-583 L330,-542 L313,-583 L272,-600 L313,-617 Z"/>
      <path d="M820,-614 L836,-576 L874,-560 L836,-544 L820,-506 L804,-544 L766,-560 L804,-576 Z"/>
      <path d="M505,-554 L515,-530 L539,-520 L515,-510 L505,-486 L495,-510 L471,-520 L495,-530 Z"/>
    </g>
    <circle cx="170" cy="-170" r="38" fill="currentColor"/>
    <circle cx="170" cy="-170" r="17" fill="#FFF3D0"/>
  </g>

  <!-- wordmark -->
  <text fill="currentColor" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="120" letter-spacing="8" text-anchor="middle">
    <textPath href="#arcTop" startOffset="50%">HITS</textPath>
  </text>
  <text fill="currentColor" font-family="Consolas, monospace" font-size="34" letter-spacing="5" text-anchor="middle" opacity=".92">
    <textPath href="#arcBot" startOffset="50%">HARDWARE IMPULSE TRAIN SYNTHESIZER</textPath>
  </text>
</svg>
