  <!-- Lightbox logic -->
  <script>
  (function(){
    const lb    = document.getElementById('story-lightbox');
    const lbImg = lb.querySelector('.story-lightbox__img');
    const lbClose = lb.querySelector('.story-lightbox__close');
    function open(src, alt){
      lbImg.src = src; lbImg.alt = alt || '';
      lb.classList.add('is-open'); lb.setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';
    }
    function close(){
      lb.classList.remove('is-open'); lb.setAttribute('aria-hidden','true');
      document.body.style.overflow = '';
      setTimeout(function(){ lbImg.src = ''; }, 300);
    }
    document.addEventListener('click', function(e){
      const t = e.target.closest('.lightbox-trigger');
      if(t){ e.preventDefault(); open(t.currentSrc || t.src, t.alt); return; }
      if(e.target === lb || e.target === lbClose) close();
    });
    document.addEventListener('keydown', function(e){
      if(e.key === 'Escape' && lb.classList.contains('is-open')) close();
    });
  })();
  </script>

  <script type="module">
    import { formatDate, newsLangFlag } from '../assets/js/main.js?v=f7bc2f44f7';
    import { getLang, t } from '../assets/js/i18n.js';
    import { newsPostUrl } from '../assets/js/content-links.js';
    import { mountPostHeart } from '../assets/js/hearts.js?v=f7bc2f44f7';

    function catClass(cat) {
      const m = { publication:'cat-publication', award:'cat-award', event:'cat-event', milestone:'cat-milestone' };
      return m[cat] || 'badge-gray';
    }

    /** Show a flag marking the language this article is displayed in. */
    function renderLangFlag(post) {
      const metaEl = document.querySelector('.post-meta');
      if (!metaEl) return;
      let holder = document.getElementById('post-lang-flag');
      if (!holder) {
        holder = document.createElement('span');
        holder.id = 'post-lang-flag';
        holder.style.display = 'inline-flex';
        holder.style.alignItems = 'center';
        metaEl.appendChild(holder);
      }
      holder.innerHTML = newsLangFlag(post);
    }

    /** Show an "Updated on <date>" stamp when the post carries an edit date. */
    function renderEditedDate(dateEdited) {
      const el = document.getElementById('post-date-edited');
      if (!el) return;
      if (dateEdited) {
        const prefix = t('news.updated');
        el.textContent = prefix + formatDate(dateEdited);
        el.setAttribute('datetime', dateEdited);
        el.style.display = '';
      } else {
        el.textContent = '';
        el.style.display = 'none';
      }
    }

    function pickLang(featured) {
      const lang = getLang() || 'en';
      const t = featured.translations || {};
      return t[lang] || t.en || t.pt || Object.values(t)[0] || {};
    }

    /** Adapt the featured-story JSON shape to the regular post shape used by the renderer. */
    function adaptFeatured(featured) {
      const tr = pickLang(featured);
      return {
        ...featured,
        title: tr.title || '',
        excerpt: tr.subtitle || tr.excerpt || '',
        content_html: tr.content_html || '',
        _featured: true,
        _author: featured.author || ''
      };
    }

    /** Compute the offset to clear the sticky top navigation when scrolling. */
    function getHeaderOffset() {
      const nav = document.getElementById('nav');
      let navH = 0;
      if (nav) {
        const r = nav.getBoundingClientRect();
        // The nav is fixed; its rect height reflects the rendered height.
        navH = r.height || nav.offsetHeight || 0;
      }
      if (!navH) {
        const cssVar = getComputedStyle(document.documentElement).getPropertyValue('--nav-h').trim();
        navH = parseInt(cssVar, 10) || 68;
      }
      return navH + 16; // small visual breathing room above the heading
    }

    /** Smooth-scroll the page so the heading sits below the sticky nav. */
    function scrollToHeading(id) {
      const target = document.getElementById(id);
      if (!target) return false;
      const rect = target.getBoundingClientRect();
      const top = rect.top + window.scrollY - getHeaderOffset();
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
      return true;
    }

    /** Build the table of contents sidebar for featured posts. */
    function injectToc(bodyEl) {
      const headings = Array.from(bodyEl.querySelectorAll('.story-section h2'));
      if (headings.length < 3) return;

      // Give each heading a stable ID
      headings.forEach((h, i) => { if (!h.id) h.id = 'ch-' + i; });

      // Snapshot the IDs into the closure — the actual elements may be
      // replaced later (innerHTML edits, language re-render). We always
      // resolve by id at click/observe time.
      const headingIds = headings.map(h => h.id);

      // Build sidebar DOM
      const sidebar = document.createElement('nav');
      sidebar.className = 'post-toc-sidebar';
      sidebar.setAttribute('aria-label', 'Story chapters');

      const label = document.createElement('div');
      label.className = 'post-toc-label';
      label.textContent = t('news.chapters');
      sidebar.appendChild(label);

      // Mobile toggle button
      const toggle = document.createElement('button');
      toggle.type = 'button';
      toggle.className = 'post-toc-toggle';
      toggle.setAttribute('aria-expanded', 'false');
      toggle.innerHTML = t('news.chapters') + ' <i class="ph ph-list" aria-hidden="true"></i>';
      sidebar.appendChild(toggle);

      const list = document.createElement('ol');
      list.className = 'post-toc-list';
      headings.forEach(function(h) {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.className = 'post-toc-link';
        a.textContent = h.textContent;
        a.dataset.targetId = h.id;
        li.appendChild(a);
        list.appendChild(li);
      });
      sidebar.appendChild(list);

      // Single delegated click handler on the list — keeps working on touch
      // devices and survives any later DOM swaps inside the body.
      list.addEventListener('click', function(e) {
        const a = e.target.closest('.post-toc-link');
        if (!a || !list.contains(a)) return;
        e.preventDefault();
        const id = a.dataset.targetId;
        if (scrollToHeading(id)) {
          history.replaceState(null, '', '#' + id);
        }
        // Auto-collapse the mobile chip-list once the user picks a chapter.
        if (list.classList.contains('is-open')) {
          list.classList.remove('is-open');
          toggle.setAttribute('aria-expanded', 'false');
        }
      });

      // Mobile toggle behaviour
      toggle.addEventListener('click', function() {
        const open = list.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      });

      // Wrap body + sidebar in the flex layout container
      const layout = document.createElement('div');
      layout.className = 'post-featured-layout';
      bodyEl.parentNode.insertBefore(layout, bodyEl);
      layout.appendChild(sidebar);
      layout.appendChild(bodyEl);

      // Intersection observer: highlight active section. Resolve elements by
      // id so the observer survives later body re-renders.
      const links = list.querySelectorAll('.post-toc-link');
      const obs = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            links.forEach(function(link) { link.classList.remove('is-active'); });
            const active = list.querySelector('a[data-target-id="' + entry.target.id + '"]');
            if (active) active.classList.add('is-active');
          }
        });
      }, { rootMargin: '-20% 0px -70% 0px' });
      headingIds.forEach(function(id) {
        const el = document.getElementById(id);
        if (el) obs.observe(el);
      });

      // If the URL already carries a chapter hash, honour it once layout has
      // settled (so we land below the sticky nav rather than under it).
      if (location.hash && location.hash.length > 1) {
        const targetId = location.hash.slice(1);
        if (headingIds.includes(targetId)) {
          requestAnimationFrame(function() { scrollToHeading(targetId); });
        }
      }
    }

    /** Make all .story-figure img elements clickable lightbox triggers. */
    function initLightbox(bodyEl) {
      bodyEl.querySelectorAll('.story-figure img').forEach(function(img) {
        img.classList.add('lightbox-trigger');
        img.style.cursor = 'zoom-in';
      });
    }

    /** Copy text to clipboard with a legacy fallback. Returns a Promise. */
    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      return new Promise((resolve) => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (e) { /* ignore */ }
        document.body.removeChild(ta);
        resolve();
      });
    }

    /**
     * Build the share panel for the current post. Deep links open the visitor's
     * own apps (WhatsApp/X/Telegram/LinkedIn) — no lab account involved. The
     * shared URL is always the canonical production URL of the post, and every
     * share text carries that link. Title/excerpt are read from the live DOM so
     * the panel stays correct across language changes; call again to rebuild.
     */
    function buildSharePanel(post) {
      const container = document.getElementById('post-share');
      if (!container || !post) return;

      const slug    = post.slug || post.id;
      // Share the per-post Open Graph page (static, generated by tools/share-gen)
      // so link unfurls on LinkedIn/WhatsApp/X are rich. It redirects humans to
      // the SPA post while crawlers read its OG tags.
      const url     = 'https://www.nipscern.com/news/' + encodeURIComponent(slug);
      const title   = (document.getElementById('post-title')?.textContent || post.title || '').trim();
      const excerpt = (document.getElementById('post-excerpt')?.textContent || post.excerpt || '').trim();
      const enc     = encodeURIComponent;
      const caption = [title, excerpt, url].filter(Boolean).join('\n\n');

      // Official brand marks (Simple Icons, CC0) drawn on a 24×24 grid — crisp
      // and correctly shaped, unlike the generic icon-font logos.
      const BRAND_SVG = {
        wa: 'M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z',
        x:  'M14.234 10.162 22.977 0h-2.072l-7.591 8.824L7.251 0H.258l9.168 13.343L.258 24H2.33l8.016-9.318L16.749 24h6.993zm-2.837 3.299-.929-1.329L3.076 1.56h3.182l5.965 8.532.929 1.329 7.754 11.09h-3.182z',
        tg: 'M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z',
        li: 'M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z',
      };
      const svgIcon = (k) => `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="${BRAND_SVG[k]}"/></svg>`;

      // Brand deep links. On mobile these open the installed app directly.
      const socials = [
        { cls: 'share-wa', icon: 'wa', key: 'news.share_wa', href: `https://wa.me/?text=${enc(title + ' — ' + url)}` },
        { cls: 'share-x',  icon: 'x',  key: 'news.share_x',  href: `https://twitter.com/intent/tweet?text=${enc(title)}&url=${enc(url)}` },
        { cls: 'share-tg', icon: 'tg', key: 'news.share_tg', href: `https://t.me/share/url?url=${enc(url)}&text=${enc(title)}` },
        { cls: 'share-li', icon: 'li', key: 'news.share_li', href: `https://www.linkedin.com/sharing/share-offsite/?url=${enc(url)}` },
      ];
      const socialsHtml = socials.map(s =>
        `<a class="share-social ${s.cls}" href="${s.href}" target="_blank" rel="noopener noreferrer" aria-label="${t(s.key)}" data-i18n-aria="${s.key}">${svgIcon(s.icon)}</a>`
      ).join('');

      container.innerHTML = `
        <span class="share-panel-label" data-i18n="news.share">${t('news.share')}</span>
        <div class="share-social-row">
          ${socialsHtml}
          <button type="button" class="share-social share-copy" aria-label="${t('news.copy_link')}" data-i18n-aria="news.copy_link"><i class="ph ph-link" aria-hidden="true"></i></button>
          <button type="button" class="share-social share-native" aria-label="${t('news.share_native')}" data-i18n-aria="news.share_native" hidden><i class="ph ph-share-network" aria-hidden="true"></i></button>
        </div>
        <button type="button" class="share-caption-btn" data-i18n="news.share_caption">${t('news.share_caption')}</button>
        <button type="button" class="share-download-toggle" aria-expanded="false" data-i18n="news.share_download"><i class="ph ph-download-simple" aria-hidden="true"></i> ${t('news.share_download')}</button>

      const toast = container.querySelector('.share-toast');
      let toastTimer;
      const showToast = (msg) => {
        toast.textContent = msg;
        toast.hidden = false;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { toast.hidden = true; }, 2500);
      };

      container.querySelector('.share-copy').addEventListener('click', () => {
        copyText(url).then(() => showToast(t('news.link_copied')));
      });
      container.querySelector('.share-caption-btn').addEventListener('click', () => {
        copyText(caption).then(() => showToast(t('news.caption_copied')));
      });

      // Native Web Share — mobile only (opens the OS sheet: Instagram, etc.).
      const nativeBtn = container.querySelector('.share-native');
      if (navigator.share) {
        nativeBtn.hidden = false;
        nativeBtn.addEventListener('click', () => {
          navigator.share({ title, text: title, url }).catch(() => { /* user cancelled */ });
        });
      }

      // -- Download-images section (images hosted on cdn.nipscern.com/share) --
      const CDN_SHARE = 'https://cdn.nipscern.com/share';
      const trans = post.translations || {};
      const dlLangs = Array.from(new Set(['en', ...Object.keys(trans)]))
        .filter(l => l === 'en' ? true : (trans[l] && (trans[l].title || trans[l].subtitle)));
      // format key → {aspect label, with-text?}. Mirrors tools/share-gen FORMATS.
      const DL_FORMATS = [
        { key: 'og',        label: 'Link · 1.91:1',  text: true  },
        { key: 'square',    label: 'Feed · 1:1',     text: true  },
        { key: 'portrait',  label: 'Portrait · 4:5', text: true  },
        { key: 'story',     label: 'Story · 9:16',   text: true  },
        { key: 'raw',       label: 'Cover · 1.91:1', text: false },
        { key: 'rawsquare', label: 'Cover · 1:1',    text: false },
        { key: 'rawstory',  label: 'Cover · 9:16',   text: false },
      ];
      // The grid lives as a full-width sibling of the button panel (so it can
      // span the whole footer, not just the right-aligned button cluster).
      const footerRow = container.parentElement;
      footerRow.querySelectorAll('.share-downloads').forEach(n => n.remove());
      const dlEl = document.createElement('div');
      dlEl.className = 'share-downloads';
      dlEl.hidden = true;
      footerRow.appendChild(dlEl);
      const toggle = container.querySelector('.share-download-toggle');
      let built = false;
      const activeLang = () => (dlLangs.includes(getLang && getLang()) ? getLang() : 'en');

      function card(fmt, lang) {
        const name = fmt.text ? `${fmt.key}-${lang}` : fmt.key;
        const href = `${CDN_SHARE}/${encodeURIComponent(slug)}/${name}.jpg`;
        const cap = fmt.label + (fmt.text ? ` · ${lang.toUpperCase()}` : '');
        return `<figure class="share-dl-card" data-lang="${fmt.text ? lang : 'raw'}">
          <a class="share-dl-thumb" href="${href}" download="nipscern-${slug}-${name}.jpg" target="_blank" rel="noopener" aria-label="${cap}">
            <img loading="lazy" src="${href}" alt="" onerror="this.closest('.share-dl-card').classList.add('is-missing')">
            <span class="share-dl-badge"><i class="ph ph-download-simple" aria-hidden="true"></i></span>
          </a>
          <figcaption>${cap}</figcaption>
        </figure>`;
      }

      function buildDownloads() {
        const tabs = dlLangs.length > 1
          ? `<div class="share-dl-tabs" role="tablist">${dlLangs.map(l =>
              `<button type="button" class="share-dl-tab${l === activeLang() ? ' is-active' : ''}" data-lang="${l}">${l.toUpperCase()}</button>`).join('')}</div>`
          : '';
        const cards = DL_FORMATS.map(f => f.text ? dlLangs.map(l => card(f, l)).join('') : card(f)).join('');
        dlEl.innerHTML = `<p class="share-dl-hint" data-i18n="news.dl_hint">${t('news.dl_hint')}</p>${tabs}<div class="share-dl-grid">${cards}</div>`;
        applyLangFilter(activeLang());
        dlEl.querySelectorAll('.share-dl-tab').forEach(btn => btn.addEventListener('click', () => {
          dlEl.querySelectorAll('.share-dl-tab').forEach(b => b.classList.toggle('is-active', b === btn));
          applyLangFilter(btn.dataset.lang);
        }));
      }
      function applyLangFilter(lang) {
        dlEl.querySelectorAll('.share-dl-card').forEach(c => {
          const dl = c.getAttribute('data-lang');
          c.style.display = (dl === 'raw' || dl === lang) ? '' : 'none';
        });
      }

      toggle.addEventListener('click', () => {
        const open = dlEl.hasAttribute('hidden');
        if (open && !built) { buildDownloads(); built = true; }
        if (open) dlEl.removeAttribute('hidden'); else dlEl.setAttribute('hidden', '');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }

    let _currentPost = null;

    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || params.get('slug');

      document.getElementById('post-loading').style.display = 'block';

      let posts;
      let featured = null;
      try {
        const [resPosts, resFeat] = await Promise.all([
          fetch('../data/news.json'),
          fetch('../data/news-featured.json')
        ]);
        posts = resPosts.ok ? await resPosts.json() : [];
        featured = resFeat.ok ? await resFeat.json() : null;
      } catch (e) {
        posts = posts || [];
      }

      document.getElementById('post-loading').style.display = 'none';

      let post;
      if (featured && [featured.id, featured.slug].includes(id)) {
        post = adaptFeatured(featured);
      } else {
        post = posts.find(p => p.id === id || p.slug === id);
      }
      if (!post) {
        document.getElementById('post-not-found').style.display = 'block';
        return;
      }

      // Mark <body> for featured-only styling
      if (post._featured) {
        document.body.classList.add('post-featured');
      }

      // Resolve translations for regular (non-featured) posts
      _currentPost = post;
      const _lang = getLang() || 'en';
      const _tr = post._featured ? {} : (post.translations && post.translations[_lang]) || {};

      // Update meta
      document.getElementById('page-title').textContent = (_tr.title || post.title) + ' — NIPS-CERN';
      document.getElementById('page-desc').content = _tr.excerpt || post.excerpt;
      document.getElementById('og-title').content = _tr.title || post.title;
      document.getElementById('og-desc').content = _tr.excerpt || post.excerpt;
      document.getElementById('og-url').content = 'https://www.nipscern.com/' + newsPostUrl(post, 'news/post');

      // Render header
      const badge = document.getElementById('post-category-badge');
      badge.className = 'badge ' + catClass(post.category);
      badge.setAttribute('data-i18n', 'news.categories.' + post.category);
      badge.textContent = post.category;

      document.getElementById('post-date').textContent = formatDate(post.date);
      document.getElementById('post-date').setAttribute('datetime', post.date);
      renderEditedDate(post.date_edited);
      renderLangFlag(post);
      document.getElementById('post-title').textContent = _tr.title || post.title;
      document.getElementById('post-excerpt').textContent = _tr.excerpt || post.excerpt;
      document.getElementById('post-header').style.display = 'block';

      // Author byline (featured stories carry an explicit author)
      if (post._featured && post._author) {
        const meta = document.querySelector('.post-meta');
        if (meta && !meta.querySelector('.post-author')) {
          const author = document.createElement('span');
          author.className = 'post-author';
          author.innerHTML = '<i class="ph ph-user-circle" aria-hidden="true"></i> ' + post._author;
          meta.appendChild(author);
        }
      }

      // Cover image — overlaps post-header so the dark bg bleeds ~15% behind the image top
      if (post.image) {
        const coverEl = document.getElementById('post-cover');
        // Absolute URLs (CDN) pass through; repo-relative paths get the ../ prefix
        const coverSrc = /^(https?:)?\/\//.test(post.image) ? post.image : '../' + post.image;
        const people = Array.isArray(post.people)
          ? post.people.filter(p => p && (typeof p === 'string' || p.name))
          : [];
        if (people.length) {
          // Annotated group photo: the cover is shown uncropped (so the hotspots
          // stay aligned) with one focusable dot per person. The name appears on
          // hover (desktop) or tap/focus (mobile). See .people-photo in main.css.
          const wrap = document.createElement('div');
          wrap.className = 'people-photo';
          const img = document.createElement('img');
          img.src = coverSrc;
          img.alt = post.title;
          img.loading = 'eager';
          wrap.appendChild(img);
          people.forEach(p => {
            // A tag name may be a plain string (people) or a per-language object
            // (e.g. the bilingual food-table tag): { pt: '…', en: '…' }.
            const name = (p && typeof p.name === 'object')
              ? (p.name[getLang() || 'en'] || p.name.en || p.name.pt || Object.values(p.name)[0] || '')
              : (typeof p === 'string' ? p : (p.name || ''));
            const px = (typeof p === 'object' && p.x != null) ? p.x : 50;
            const py = (typeof p === 'object' && p.y != null) ? p.y : 50;
            const tag = document.createElement('button');
            tag.type = 'button';
            tag.className = 'people-tag';
            // Dots near the left/right edge would have their centred label clipped
            // by the screen on mobile — flag them so the CSS anchors the label
            // inward (the dot itself stays put). See .people-tag--edge-* in main.css.
            if (px <= 25) tag.classList.add('people-tag--edge-left');
            else if (px >= 75) tag.classList.add('people-tag--edge-right');
            tag.style.left = px + '%';
            tag.style.top  = py + '%';
            tag.setAttribute('aria-label', name);
            const dot = document.createElement('span');
            dot.className = 'people-tag-dot';
            dot.setAttribute('aria-hidden', 'true');
            const label = document.createElement('span');
            label.className = 'people-tag-label';
            label.textContent = name;
            tag.appendChild(dot);
            tag.appendChild(label);
            wrap.appendChild(tag);
          });
          coverEl.appendChild(wrap);
        } else {
          const img = document.createElement('img');
          img.src = coverSrc;
          img.alt = post.title;
          img.style.cssText = 'width:100%;max-height:460px;object-fit:cover;display:block;border-radius:var(--r-xl)';
          img.loading = 'eager';
          coverEl.appendChild(img);
        }
        coverEl.style.display = 'block';
        document.getElementById('post-header').classList.add('has-cover');
      }

      // Render body — featured stories carry rich HTML, regular posts carry plain text
      const bodyEl = document.getElementById('post-body');
      const isFeatured = post._featured && post.content_html;
      if (isFeatured) {
        bodyEl.classList.add('post-body-featured');
        bodyEl.innerHTML = post.content_html;
        initLightbox(bodyEl);
      } else {
        const rawContent = _tr.content || post.content || '';
        const paragraphs = rawContent.split('\n\n').map(p => p.trim().startsWith('<') ? p.trim() : `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
        bodyEl.innerHTML = paragraphs;
      }
      bodyEl.style.display = 'block';

      // Appreciation heart — interactive, with click feedback (see hearts.js).
      const heartsEl = document.getElementById('post-hearts');
      if (heartsEl) {
        heartsEl.replaceChildren();
        mountPostHeart(heartsEl, post);
        heartsEl.style.display = 'block';
      }

      // Embedded video (YouTube). insertAdjacentHTML appends without
      // re-parsing existing children, so anything we touch afterwards keeps
      // working (handlers, observers, references).
      if (post.video) {
        const ytId = post.video.match(/(?:v=|youtu\.be\/)([^&?/]+)/)?.[1];
        if (ytId) {
          bodyEl.insertAdjacentHTML('beforeend', `
            <div class="post-video-wrap" style="margin:var(--sp-10) 0">
              <iframe
                src="https://www.youtube-nocookie.com/embed/${ytId}"
                title="Video: ${post.title}"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen
                loading="lazy"
                style="width:100%;aspect-ratio:16/9;border:0;border-radius:var(--r-xl);display:block"
              ></iframe>
            </div>`);
        }
      }

      // Tags
      if (post.tags && post.tags.length) {
        bodyEl.insertAdjacentHTML('beforeend', `<div class="pub-tags" style="margin-top:var(--sp-8)">${post.tags.map(t => `<span class="pub-tag">${t}</span>`).join('')}</div>`);
      }

      // Build the chapter sidebar last, after all body edits, so it sees the
      // final DOM and its handlers don't get wiped by later innerHTML writes.
      if (isFeatured) {
        injectToc(bodyEl);
      }

      // Related articles
      if (post.related_ids && post.related_ids.length) {
        const relatedPosts = post.related_ids.map(rid => posts.find(p => p.id === rid)).filter(Boolean);
        if (relatedPosts.length) {
          const listEl = document.getElementById('post-related-list');
          relatedPosts.forEach(rp => {
            const a = document.createElement('a');
            a.href = newsPostUrl(rp);
            a.style.cssText = 'display:flex;gap:var(--sp-3);align-items:center;padding:var(--sp-3) var(--sp-4);background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--r-lg);text-decoration:none;transition:border-color 0.15s';
            a.onmouseover = () => { a.style.borderColor = 'var(--border-mid)'; };
            a.onmouseout  = () => { a.style.borderColor = 'var(--border-subtle)'; };
            const badgeEl = document.createElement('span');
            badgeEl.className = 'badge ' + catClass(rp.category);
            badgeEl.style.flexShrink = '0';
            badgeEl.textContent = rp.category;
            const titleEl = document.createElement('span');
            titleEl.style.cssText = 'font-size:var(--text-sm);color:var(--text-primary);flex:1;line-height:1.4';
            titleEl.textContent = rp.title;
            const arrow = document.createElement('i');
            arrow.className = 'ph ph-arrow-right';
            arrow.style.cssText = 'color:var(--text-muted);flex-shrink:0';
            a.appendChild(badgeEl);
            a.appendChild(titleEl);
            a.appendChild(arrow);
            listEl.appendChild(a);
          });
          document.getElementById('post-related').style.display = 'block';
        }
      }

      document.getElementById('post-footer').style.display = 'block';

      // Generic share panel (deep links + copy + native Web Share + LinkedIn caption)
      buildSharePanel(post);
    }

    document.addEventListener('DOMContentLoaded', loadPost);

    // If the user changes language while reading the featured story, re-render
    document.addEventListener('langchange', async () => {
      // Regular (non-featured) posts: swap title, excerpt and body on language change
      if (!document.body.classList.contains('post-featured')) {
        if (!_currentPost) return;
        const lang = getLang() || 'en';
        const tr = (_currentPost.translations && _currentPost.translations[lang]) || {};
        document.getElementById('post-title').textContent   = tr.title   || _currentPost.title;
        document.getElementById('post-excerpt').textContent = tr.excerpt || _currentPost.excerpt;
        document.getElementById('page-title').textContent   = (tr.title || _currentPost.title) + ' — NIPS-CERN';
        const rawContent = tr.content || _currentPost.content || '';
        if (rawContent) {
          const bodyEl = document.getElementById('post-body');
          bodyEl.innerHTML = rawContent.split('\n\n').map(p => p.trim().startsWith('<') ? p.trim() : `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
          if (_currentPost.tags && _currentPost.tags.length) {
            bodyEl.insertAdjacentHTML('beforeend', `<div class="pub-tags" style="margin-top:var(--sp-8)">${_currentPost.tags.map(t => `<span class="pub-tag">${t}</span>`).join('')}</div>`);
          }
        }
        // Refresh people-tag labels (e.g. the bilingual food-table tag) for the new language
        if (Array.isArray(_currentPost.people)) {
          const labels = document.querySelectorAll('#post-cover .people-tag-label');
          const tags   = document.querySelectorAll('#post-cover .people-tag');
          _currentPost.people.forEach((p, i) => {
            const nm = (p && typeof p.name === 'object')
              ? (p.name[lang] || p.name.en || p.name.pt || Object.values(p.name)[0] || '')
              : (typeof p === 'string' ? p : (p.name || ''));
            if (labels[i]) labels[i].textContent = nm;
            if (tags[i]) tags[i].setAttribute('aria-label', nm);
          });
        }
        buildSharePanel(_currentPost);
        return;
      }
      try {
        const res = await fetch('../data/news-featured.json');
        if (!res.ok) return;
        const featured = await res.json();
        const params = new URLSearchParams(window.location.search);
        const currentId = params.get('id') || params.get('slug');
        if (![featured.id, featured.slug].includes(currentId)) return;
        const tr = pickLang(featured);
        document.getElementById('post-title').textContent   = tr.title || '';
        document.getElementById('post-excerpt').textContent = tr.subtitle || tr.excerpt || '';
        document.getElementById('page-title').textContent   = (tr.title || '') + ' — NIPS-CERN';
        renderEditedDate(featured.date_edited);
        renderLangFlag(featured);
        buildSharePanel(_currentPost);
        const bodyEl = document.getElementById('post-body');
        // Remove any existing TOC layout wrapper before re-rendering
        const layout = document.querySelector('.post-featured-layout');
        if (layout) {
          layout.parentNode.insertBefore(bodyEl, layout);
          layout.remove();
        }
        bodyEl.innerHTML = tr.content_html || '';
        if (featured.tags && featured.tags.length) {
          bodyEl.insertAdjacentHTML('beforeend', `<div class="pub-tags" style="margin-top:var(--sp-8)">${featured.tags.map(t => `<span class="pub-tag">${t}</span>`).join('')}</div>`);
        }
        initLightbox(bodyEl);
        injectToc(bodyEl);
      } catch (e) { /* keep current rendering on failure */ }
    });
  </script>

  <script type="module" src="../assets/js/main.js?v=f7bc2f44f7"></script>
  <script src="../assets/js/analytics.js" defer></script>
