<title>Two Papers with NIPS-CERN Participation Accepted at SBrT 2026 — NIPS-CERN</title>
<meta name="description" content="Two papers co-authored by members of NIPS-CERN were accepted at the Brazilian Symposium on Telecommunications and Signal Processing (SBrT 2026), held in Salvador at the end of September. One comes from a collaboration between Brazil and France and uses neural networks to reduce crosstalk in finely segmented calorimeters. The other continues the group's work on signal reconstruction in high-energy calorimetry with CNNs.">
