  <style>
    .courier-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: var(--sp-4);
      margin-top: var(--sp-8);
    }

    .courier-card {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      overflow: hidden;
      background: var(--bg-card);
      text-decoration: none;
      transition: border-color var(--t-base), transform var(--t-base), box-shadow var(--t-base);
    }
    .courier-card:hover {
      border-color: var(--border-mid);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .courier-cover {
      aspect-ratio: 3/4;
      background: var(--bg-elevated);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .courier-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .courier-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      color: var(--text-muted);
      padding: var(--sp-3);
      text-align: center;
    }
    .courier-cover-placeholder i { font-size: 28px; opacity: 0.3; }
    .courier-cover-placeholder span {
      font-size: 10px;
      font-family: var(--font-mono);
      opacity: 0.4;
      line-height: 1.3;
    }

    .courier-meta {
      padding: var(--sp-3);
      border-top: 1px solid var(--border-subtle);
    }
    .courier-issue { font-size: var(--text-xs); font-weight: 700; color: var(--text-primary); }
    .courier-title-muted {
      color: var(--text-muted);
      font-size: 10px;
      line-height: 1.35;
      margin-top: 4px;
      min-height: 2.7em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .courier-pdf-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 9px;
      font-weight: 600;
      color: var(--brand);
      margin-top: var(--sp-2);
      letter-spacing: 0.05em;
    }
    .courier-pdf-badge i { font-size: 10px; }

    .year-group { margin-top: var(--sp-12); }
    .year-group:first-child { margin-top: 0; }
    .year-label {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-subtle);
      padding-bottom: var(--sp-3);
      margin-bottom: var(--sp-4);
    }

    .courier-filter {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      flex-wrap: wrap;
      margin-bottom: var(--sp-6);
    }
    .courier-filter-btn {
      padding: var(--sp-2) var(--sp-4);
      border-radius: var(--r-full);
      border: 1px solid var(--border-mid);
      background: transparent;
      color: var(--text-secondary);
      font-size: var(--text-xs);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t-base);
      letter-spacing: 0.04em;
    }
    .courier-filter-btn.active,
    .courier-filter-btn:hover {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .courier-search {
      margin-bottom: var(--sp-5);
      max-width: 520px;
      position: relative;
    }
    .courier-search i {
      position: absolute;
      left: var(--sp-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      pointer-events: none;
    }
    .courier-search-input {
      width: 100%;
      height: 44px;
      padding: 0 var(--sp-4) 0 42px;
      border-radius: var(--r-md);
      border: 1px solid var(--border-mid);
      background: var(--bg-card);
      color: var(--text-primary);
      font: inherit;
      font-size: var(--text-sm);
      outline: none;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
    }
    .courier-search-input::placeholder { color: var(--text-muted); }
    .courier-search-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-dim);
    }
    .courier-empty {
      display: none;
      color: var(--text-muted);
      font-size: var(--text-sm);
      padding: var(--sp-8) 0;
    }

    @media (max-width: 640px) {
      .courier-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }

    };

    function titleKey(year, entry) {
      return String(year) + entry.pdfMon;
    }

    function normalizeSearch(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/['’]s\b/g, '')
        .replace(/[^a-z0-9]+/g, ' ')
        .trim();
    }

    function pdfUrl(year, entry) {
      if (year <= 2018) {
        return 'https://cerncourier.com/wp-content/uploads/2019/04/CERNCourier' + year + entry.pdfMon + '-digitaledition.pdf';
      }
      var uploadMon = entry.mon;
      if (year === 2026 && entry.pdfMon === 'MarApr') uploadMon = '05';
      if (year === 2026 && entry.pdfMon === 'MayJun') uploadMon = '06';
      return 'https://cerncourier.com/wp-content/uploads/' + year + '/' + uploadMon + '/CERNCourier' + year + entry.pdfMon + '-digitaledition.pdf';
    }

    function coverPath(year, entry) {
      return '../assets/images/magazine/CERNCourier' + year + entry.pdfMon + '.jpg';
    }

    function buildIssues() {
      var issues = [];
      for (var year = 2013; year <= 2026; year++) {
        var months = year <= 2018 ? MONTHS_MONTHLY : MONTHS_BIMONTHLY;
        for (var i = 0; i < months.length; i++) {
          var entry = months[i];
          if (year === 2026 && !['01', '03', '05'].includes(entry.mon)) break;
          issues.push(Object.assign({
            year: year,
            coverTitle: COURIER_TITLES[titleKey(year, entry)] || ''
          }, entry));
        }
      }
      return issues.reverse();
    }

    function makeCard(issue) {
      var a = document.createElement('a');
      a.href = pdfUrl(issue.year, issue);
      a.target = '_blank';
      a.rel = 'noopener';
      a.className = 'courier-card';
      a.dataset.year = String(issue.year);
      a.dataset.search = [
        'CERN Courier',
        issue.label,
        issue.year,
        issue.coverTitle
      ].map(normalizeSearch).join(' ');
      a.setAttribute('aria-label', 'CERN Courier ' + issue.label + ' ' + issue.year + (issue.coverTitle ? ' — ' + issue.coverTitle : ''));

      var cover = document.createElement('div');
      cover.className = 'courier-cover';

      var img = document.createElement('img');
      img.src = coverPath(issue.year, issue);
      img.alt = 'CERN Courier ' + issue.label + ' ' + issue.year + ' cover';
      img.loading = 'lazy';
      img.onerror = function() {
        this.style.display = 'none';
        this.nextElementSibling.style.display = 'flex';
      };

      var placeholder = document.createElement('div');
      placeholder.className = 'courier-cover-placeholder';
      placeholder.style.display = 'none';
      var phIcon = document.createElement('i');
      phIcon.className = 'ph ph-newspaper';
      phIcon.setAttribute('aria-hidden', 'true');
      var phSpan = document.createElement('span');
      phSpan.appendChild(document.createTextNode(issue.label));
      phSpan.appendChild(document.createElement('br'));
      phSpan.appendChild(document.createTextNode(String(issue.year)));
      placeholder.appendChild(phIcon);
      placeholder.appendChild(phSpan);

      cover.appendChild(img);
      cover.appendChild(placeholder);

      var meta = document.createElement('div');
      meta.className = 'courier-meta';

      var issueEl = document.createElement('div');
      issueEl.className = 'courier-issue';
      issueEl.textContent = issue.label + ' ' + issue.year;

      var titleEl = document.createElement('div');
      titleEl.className = 'courier-title-muted';
      titleEl.textContent = issue.coverTitle;

      var badge = document.createElement('div');
      badge.className = 'courier-pdf-badge';
      var badgeIcon = document.createElement('i');
      badgeIcon.className = 'ph ph-file-pdf';
      badgeIcon.setAttribute('aria-hidden', 'true');
      badge.appendChild(badgeIcon);
      badge.appendChild(document.createTextNode(' PDF'));

      meta.appendChild(issueEl);
      meta.appendChild(titleEl);
      meta.appendChild(badge);

      a.appendChild(cover);
      a.appendChild(meta);
      return a;
    }

    function makeYearGroup(year, issues) {
      var group = document.createElement('div');
      group.className = 'year-group';
      group.dataset.year = String(year);

      var label = document.createElement('div');
      label.className = 'year-label';
      label.textContent = String(year);

      var grid = document.createElement('div');
      grid.className = 'courier-grid';
      for (var i = 0; i < issues.length; i++) {
        grid.appendChild(makeCard(issues[i]));
      }

      group.appendChild(label);
      group.appendChild(grid);
      return group;
    }

    function renderIssues(issues) {
      var container = document.getElementById('courier-editions');
      if (!container) return;

      var byYear = {};
      for (var i = 0; i < issues.length; i++) {
        var yr = issues[i].year;
        if (!byYear[yr]) byYear[yr] = [];
        byYear[yr].push(issues[i]);
      }

      var years = Object.keys(byYear).sort(function(a, b) { return b - a; });
      container.replaceChildren();
      for (var j = 0; j < years.length; j++) {
        container.appendChild(makeYearGroup(years[j], byYear[years[j]]));
      }

      // Bypass IntersectionObserver timing — force visible on initial load
      container.classList.add('visible');
    }

    function applyFilters() {
      var activeBtn = document.querySelector('.courier-filter-btn.active');
      var activeYear = activeBtn ? activeBtn.dataset.year : 'all';
      var searchInput = document.getElementById('courier-search');
      var query = searchInput ? normalizeSearch(searchInput.value) : '';
      var visibleCount = 0;

      document.querySelectorAll('.year-group').forEach(function(group) {
        var groupYearMatches = activeYear === 'all' || group.dataset.year === activeYear;
        var groupVisibleCount = 0;

        group.querySelectorAll('.courier-card').forEach(function(card) {
          var searchMatches = !query || card.dataset.search.indexOf(query) !== -1;
          var showCard = groupYearMatches && searchMatches;
          card.style.display = showCard ? '' : 'none';
          if (showCard) {
            groupVisibleCount++;
            visibleCount++;
          }
        });

        group.style.display = groupVisibleCount > 0 ? '' : 'none';
      });

      var empty = document.getElementById('courier-empty');
      if (empty) empty.style.display = visibleCount > 0 ? 'none' : 'block';
    }

    function initFilter() {
      document.querySelectorAll('.courier-filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.courier-filter-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          applyFilters();
        });
      });

      var searchInput = document.getElementById('courier-search');
      if (searchInput) {
        searchInput.addEventListener('input', applyFilters);
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderIssues(buildIssues());
      initFilter();
    });
  </script>

  <script src="../assets/js/analytics.js" defer></script>
</body>
</html>
